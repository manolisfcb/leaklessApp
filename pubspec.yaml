name: leakless
description: "leakless — control de gastos en pareja con detección de micro-fugas, presupuestos y metas, sincronizado en tiempo real."
publish_to: 'none'

# version + build number.
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # --- UI / iconography ---
  cupertino_icons: ^1.0.8
  google_fonts: ^6.3.2 # Carga la tipografía "Outfit" del diseño sin empaquetar binarios.
  flutter_svg: ^2.3.0

  # --- Media: avatar picker (gallery/camera) ---
  image_picker: ^1.1.2

  # --- State management ---
  flutter_riverpod: ^3.3.2

  # --- Navigation ---
  go_router: ^17.3.0

  # --- Invitation links / secure handoff / sharing ---
  flutter_secure_storage: ^10.3.1
  qr_flutter: ^4.1.0
  share_plus: ^13.2.0

  # --- Immutable models + serialization ---
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # --- Backend: Supabase (auth, db, realtime, storage) ---
  supabase_flutter: ^2.15.2

  # --- Infra: Firebase (push, crashlytics, analytics) ---
  firebase_core: ^4.11.0
  firebase_messaging: ^16.4.1
  firebase_crashlytics: ^5.2.4
  firebase_analytics: ^12.4.3

  # --- Monetization: RevenueCat ---
  purchases_flutter: ^10.3.0

  # --- Config / i18n / storage / logging ---
  flutter_dotenv: ^6.0.1
  intl: ^0.20.2
  shared_preferences: ^2.5.5
  logging: ^1.3.0

# The newest path_provider plugin implementations (foundation ≥2.5.0 / android
# ≥2.3.0) ship native build hooks (objective_c / jni). On the current Dart SDK
# `dart compile` rejects build hooks, which breaks build_runner's bootstrap
# ("'dart compile' does not support build hooks"). Pinning to the last pre-hook
# versions keeps codegen working; they are fully API-compatible. Remove once the
# toolchain supports build hooks during codegen.
dependency_overrides:
  path_provider_foundation: 2.4.4
  path_provider_android: 2.2.23

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # --- Codegen ---
  build_runner: ^2.4.13
  freezed: ^3.2.3
  json_serializable: ^6.9.5

  # --- Testing ---
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  generate: true

  assets:
    - .env
    - assets/images/
    - assets/icons/
