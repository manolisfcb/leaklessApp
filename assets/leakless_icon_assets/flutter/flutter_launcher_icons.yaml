# Ejemplo para usar con flutter_launcher_icons
# dart run flutter_launcher_icons

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icons/leakless_icon_1024.png"
  adaptive_icon_background: "#00282A"
  adaptive_icon_foreground: "assets/icons/leakless_icon_foreground_1024.png"
  web:
    generate: true
    image_path: "assets/icons/leakless_icon_1024.png"
    background_color: "#00282A"
    theme_color: "#00282A"
